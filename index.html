<!DOCTYPE html>
<!--
  本次修改：合并最新页面入口到源文件，入口脚本恢复为无版本引用。
-->
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>智慧工地数字孪生监控平台 | AI风险预警</title>
  <link rel="icon" href="data:,">

  <!-- ES6 Import Map: three 核心用本地, addons 从 CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "./libs/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0a0e27;
      color: #e0eaff;
    }

    /* 3D 画布全屏 */
    #c {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 1;
    }

    /* 摄像头标签样式 */
    .cam-label {
      position: absolute;
      padding: 4px 10px;
      background: rgba(10, 20, 50, 0.85);
      border: 1px solid rgba(0, 200, 255, 0.4);
      border-radius: 4px;
      color: #00d4ff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      white-space: nowrap;
      z-index: 50;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      transform: translate(-50%, -50%);
    }
    .cam-label:hover {
      background: rgba(0, 200, 255, 0.2);
      border-color: #00d4ff;
      box-shadow: 0 0 12px rgba(0, 200, 255, 0.5);
    }
    .cam-label.active {
      background: rgba(0, 200, 255, 0.3);
      border-color: #00d4ff;
      box-shadow: 0 0 16px rgba(0, 200, 255, 0.6);
    }
    .cam-label.alerting {
      animation: camAlertBlink 0.4s ease-in-out infinite alternate;
    }
    @keyframes camAlertBlink {
      from { background: rgba(255, 51, 102, 0.3); border-color: #ff3366; box-shadow: 0 0 12px rgba(255, 51, 102, 0.6); }
      to   { background: rgba(10, 20, 50, 0.85);  border-color: #ff3366; }
    }

    /* 报警浮动标签 */
    .alert-label {
      position: absolute;
      padding: 3px 8px;
      background: rgba(255, 0, 51, 0.85);
      border-radius: 3px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
      z-index: 49;
      transform: translate(-50%, -100%);
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
    }

    /* 加载动画 */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      text-align: center;
    }
    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 200, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      color: #00d4ff;
      font-size: 14px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <!-- 加载提示 -->
  <div id="loading">
    <div class="spinner"></div>
    <p>系统初始化中...</p>
  </div>

  <!-- 3D 画布 -->
  <canvas id="c"></canvas>

  <!-- 主入口模块 -->
  <script type="module" src="./src/App.js"></script>
</body>
</html>
